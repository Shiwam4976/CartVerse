<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up - Amazon Clone</title>
<link rel="stylesheet" href="style.css">
<style>
.auth-container { max-width: 400px; margin: 50px auto; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); overflow: hidden; }
.auth-tabs { display: flex; }
.auth-tab { flex: 1; padding: 15px; background: #f3f6fb; border: none; cursor: pointer; font-weight: 600; transition: background 0.3s; }
.auth-tab.active { background: #ff9900; color: #fff; }
.auth-form { padding: 30px; display: none; }
.auth-form.active { display: block; }
.auth-form input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
.auth-form button { width: 100%; padding: 12px; background: #ff9900; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
.auth-form button:hover { background: #e68a00; }
.auth-form p { text-align: center; margin-top: 15px; }
.auth-form p a { color: #ff9900; text-decoration: none; }
</style>
</head>
<body>
<div class="auth-container">
<div class="auth-tabs">
<button class="auth-tab active" onclick="showForm('login')">Login</button>
<button class="auth-tab" onclick="showForm('signup')">Sign Up</button>
</div>
<div id="login-form" class="auth-form active">
<h2>Login</h2>
<form id="loginForm">
<input type="email" id="loginEmail" placeholder="Email" required>
<input type="password" id="loginPassword" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p>Forgot password? <a href="#">Reset here</a></p>
</div>
<div id="signup-form" class="auth-form">
<h2>Sign Up</h2>
<form id="signupForm">
<input type="text" id="signupName" placeholder="Full Name" required>
<input type="email" id="signupEmail" placeholder="Email" required>
<input type="password" id="signupPassword" placeholder="Password" required>
<input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
<button type="submit">Sign Up</button>
</form>
<p>Already have an account? <a href="#" onclick="showForm('login')">Login here</a></p>
</div>
</div>
<script>
function showForm(form) {
document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
if (form === 'login') {
document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
document.getElementById('login-form').classList.add('active');
} else {
document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
document.getElementById('signup-form').classList.add('active');
}
}

// Handle Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  
  try {
    const response = await fetch('http://localhost:5000/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await response.json();
    
    if (data === 'Login Successful') {
      localStorage.setItem('userEmail', email);
      alert('Login successful! Redirecting...');
      window.location.href = 'index.html';
    } else {
      alert('Invalid credentials');
    }
  } catch (error) {
    alert('Server error. Make sure backend is running on port 5000.');
  }
});

// Handle Signup
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const confirmPassword = document.getElementById('signupConfirmPassword').value;
  
  if (password !== confirmPassword) {
    alert('Passwords do not match');
    return;
  }
  
  try {
    const response = await fetch('http://localhost:5000/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await response.json();
    
    if (data === 'User Registered Successfully') {
      localStorage.setItem('userEmail', email);
      alert('Signup successful! Redirecting...');
      window.location.href = 'index.html';
    } else {
      alert('Signup failed. Email may already exist.');
    }
  } catch (error) {
    alert('Server error. Make sure backend is running on port 5000.');
  }
});
</script>
</body>
</html>
